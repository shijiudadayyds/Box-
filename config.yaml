# =========================================================
# 懒人配置模板 for Box / Mihomo / Meta
# 使用说明：
# 1. 把 proxy-providers 里的 url 改成你自己的订阅链接
# 2. 导入后，默认大部分场景直接可用
# 3. 如某地区组为空，通常是机场命名不一致，可自行调整 filter
# =========================================================

proxy-providers:
  订阅1:
    type: http
    url: "填写你的订阅链接"
    path: ./proxy_provider/proxy1.yaml
    interval: 86400
    override:
      udp: true
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 300
      timeout: 1000
      tolerance: 100

  订阅2:
    type: http
    url: "填写你的订阅链接"
    path: ./proxy_provider/proxy2.yaml
    interval: 86400
    override:
      udp: true
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 300
      timeout: 1000
      tolerance: 100

  订阅3:
    type: http
    url: "填写你的订阅链接"
    path: ./proxy_provider/proxy3.yaml
    interval: 86400
    override:
      udp: true
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 300
      timeout: 1000
      tolerance: 100

  订阅4:
    type: http
    url: "填写你的订阅链接"
    path: ./proxy_provider/proxy4.yaml
    interval: 86400
    override:
      udp: true
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 300
      timeout: 1000
      tolerance: 100

# =========================
# 端口设置
# mixed-port: 通用端口
# port: HTTP 代理端口
# socks-port: SOCKS5 代理端口
# =========================
mixed-port: 7890
port: 7891
socks-port: 12306
redir-port: 9797
tproxy-port: 9898

mode: Rule
bind-address: "*"
ipv6: true
allow-lan: true
unified-delay: true
tcp-concurrent: true
log-level: error
find-process-mode: always
keep-alive-interval: 15

external-controller: 0.0.0.0:9090
external-ui: ./dashboard

profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  override-destination: false
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]

tun:
  enable: false
  device: meta
  stack: gvisor
  dns-hijack: [any:53, tcp://any:53]
  udp-timeout: 300
  auto-route: true
  auto-redirect: false
  auto-detect-interface: true
  strict-route: false

dns:
  enable: true
  ipv6: true
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - localhost.ptlogin2.qq.com
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "rule-set:private_domain"
    - "rule-set:cn_domain"
    - "rule-set:Fake-IP-Filter"

  default-nameserver:
    - 223.5.5.5
    - 1.1.1.1

  proxy-server-nameserver:
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query

  nameserver-policy:
    "rule-set:cn_domain":
      - 223.5.5.5
      - 119.29.29.29
    "rule-set:private_domain":
      - 223.5.5.5
      - 119.29.29.29

  nameserver:
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query
    - 223.5.5.5
    - 119.29.29.29

proxies:
  - {name: DNS_Hijack, type: dns}

proxy-groups:
  - name: 节点选择
    type: select
    proxies:
      - 自动选择
      - 故障转移
      - 香港节点
      - 日本节点
      - 新加坡节点
      - 美国节点
      - 韩国节点
      - 台湾节点
      - 全部节点
      - DIRECT

  - name: 自动选择
    type: url-test
    include-all: true
    exclude-type: dns
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
    lazy: true

  - name: 故障转移
    type: fallback
    include-all: true
    exclude-type: dns
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    lazy: true

  - name: 香港节点
    type: url-test
    include-all: true
    exclude-type: dns
    filter: "(?i)(港|香港|hk|hkg|hong\\s?kong|hongkong)"
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
    lazy: true

  - name: 日本节点
    type: url-test
    include-all: true
    exclude-type: dns
    filter: "(?i)(日|日本|jp|jpn|japan|tokyo|osaka|东京|大阪)"
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
    lazy: true

  - name: 新加坡节点
    type: url-test
    include-all: true
    exclude-type: dns
    filter: "(?i)(新|新加坡|狮城|sg|sgp|singapore)"
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
    lazy: true

  - name: 美国节点
    type: url-test
    include-all: true
    exclude-type: dns
    filter: "(?i)(美|美国|us|usa|america|united\\s?states|los\\s?angeles|san\\s?jose|new\\s?york|seattle|dallas|fremont)"
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
    lazy: true

  - name: 韩国节点
    type: url-test
    include-all: true
    exclude-type: dns
    filter: "(?i)(韩|韩国|kr|kor|korea|seoul|首尔)"
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
    lazy: true

  - name: 台湾节点
    type: url-test
    include-all: true
    exclude-type: dns
    filter: "(?i)(台|台湾|tw|twn|taiwan|taipei|台北|新北|彰化)"
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
    lazy: true

  - name: 全部节点
    type: select
    include-all: true
    exclude-type: dns

  - name: OpenAI
    type: select
    proxies:
      - 日本节点
      - 新加坡节点
      - 美国节点
      - 故障转移
      - 自动选择
      - 香港节点
      - 台湾节点
      - 韩国节点
      - 节点选择
      - 全部节点
      - DIRECT

  - name: YouTube
    type: select
    proxies:
      - 自动选择
      - 香港节点
      - 日本节点
      - 台湾节点
      - 新加坡节点
      - 美国节点
      - 故障转移
      - 节点选择
      - 全部节点
      - DIRECT

  - name: Netflix
    type: select
    proxies:
      - 日本节点
      - 新加坡节点
      - 美国节点
      - 香港节点
      - 台湾节点
      - 自动选择
      - 故障转移
      - 节点选择
      - 全部节点
      - DIRECT

  - name: Disney+
    type: select
    proxies:
      - 日本节点
      - 新加坡节点
      - 美国节点
      - 香港节点
      - 台湾节点
      - 自动选择
      - 故障转移
      - 节点选择
      - 全部节点
      - DIRECT

  - name: TikTok
    type: select
    proxies:
      - 美国节点
      - 日本节点
      - 新加坡节点
      - 韩国节点
      - 故障转移
      - 自动选择
      - 节点选择
      - 全部节点
      - DIRECT

  - name: Telegram
    type: select
    proxies:
      - 故障转移
      - 自动选择
      - 新加坡节点
      - 香港节点
      - 日本节点
      - 美国节点
      - 台湾节点
      - 节点选择
      - 全部节点
      - DIRECT

  - name: GitHub
    type: select
    proxies:
      - 故障转移
      - 自动选择
      - 香港节点
      - 日本节点
      - 美国节点
      - 新加坡节点
      - 台湾节点
      - 节点选择
      - 全部节点
      - DIRECT

  - name: 国外代理
    type: select
    proxies:
      - 节点选择
      - 自动选择
      - 故障转移
      - 香港节点
      - 日本节点
      - 新加坡节点
      - 美国节点
      - 韩国节点
      - 台湾节点
      - 全部节点

  - name: 国内直连
    type: select
    proxies:
      - DIRECT
      - 节点选择

  - name: 漏网之鱼
    type: select
    proxies:
      - 国外代理
      - 节点选择
      - 故障转移
      - 国内直连
      - DIRECT

rule-providers:
  Fake-IP-Filter:
    type: http
    behavior: domain
    format: mrs
    interval: 86400
    path: ./rule_provider/Fake-IP-Filter.mrs
    url: "https://raw.githubusercontent.com/DustinWin/ruleset_geodata/mihomo-ruleset/fakeip-filter.mrs"
    proxy: DIRECT

  proxy_domain:
    type: http
    behavior: domain
    format: mrs
    interval: 86400
    path: ./rule_provider/proxy_domain.mrs
    url: "https://raw.githubusercontent.com/DustinWin/ruleset_geodata/mihomo-ruleset/proxy.mrs"
    proxy: DIRECT

  cn_ip:
    type: http
    behavior: ipcidr
    format: mrs
    interval: 86400
    path: ./rule_provider/cn_ip.mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/cn.mrs"
    proxy: DIRECT

  private_ip:
    type: http
    behavior: ipcidr
    format: mrs
    interval: 86400
    path: ./rule_provider/private_ip.mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/private.mrs"
    proxy: DIRECT

  cn_domain:
    type: http
    behavior: domain
    format: mrs
    interval: 86400
    path: ./rule_provider/cn_domain.mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/cn.mrs"
    proxy: DIRECT

  private_domain:
    type: http
    behavior: domain
    format: mrs
    interval: 86400
    path: ./rule_provider/private_domain.mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.mrs"
