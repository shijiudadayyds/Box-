# ================================
# Box / Mihomo 上帝模式终极模板版
# 无订阅信息 | 智能优选 | 自动测速 | 故障转移 | 多地区分流
# 使用方法：
# 1. 将 proxy-providers 中的 url 替换为你的订阅链接
# 2. 导入 Box / Mihomo
# 3. 默认推荐：
#    - OpenAI -> OpenAI
#    - Telegram -> Telegram
#    - Netflix -> Netflix
#    - Disney+ -> Disney+
#    - TikTok -> TikTok
#    - 国外代理 -> 自动选择
# ================================

proxy-providers:
  订阅1:
    type: http
    url: "填写你的订阅链接"
    path: ./proxy_provider/proxy1.yaml
    interval: 86400
    override:
      udp: true
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 300
      timeout: 1000
      tolerance: 100

  订阅2:
    type: http
    url: "填写你的订阅链接"
    path: ./proxy_provider/proxy2.yaml
    interval: 86400
    override:
      udp: true
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 300
      timeout: 1000
      tolerance: 100

  订阅3:
    type: http
    url: "填写你的订阅链接"
    path: ./proxy_provider/proxy3.yaml
    interval: 86400
    override:
      udp: true
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 300
      timeout: 1000
      tolerance: 100

  订阅4:
    type: http
    url: "填写你的订阅链接"
    path: ./proxy_provider/proxy4.yaml
    interval: 86400
    override:
      udp: true
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 300
      timeout: 1000
      tolerance: 100

mixed-port: 7890
port: 7891
socks-port: 12306
redir-port: 9797
tproxy-port: 9898

mode: Rule
bind-address: "*"
ipv6: true
allow-lan: true
unified-delay: true
tcp-concurrent: true
log-level: error
find-process-mode: always
keep-alive-idle: 600
keep-alive-interval: 15

external-controller: 0.0.0.0:9090
external-ui: ./dashboard

profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  override-destination: false
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]

tun:
  enable: false
  device: meta
  stack: gvisor
  dns-hijack:
    - any:53
    - tcp://any:53
  udp-timeout: 300
  auto-route: true
  auto-redirect: false
  auto-detect-interface: true
  strict-route: false

dns:
  enable: true
  ipv6: true
  listen: 0.0.0.0:1053
  prefer-h3: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - localhost.ptlogin2.qq.com
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "rule-set:Fake-IP-Filter"
    - "rule-set:private_domain"
    - "rule-set:cn_domain"

  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 1.1.1.1
    - 8.8.8.8

  proxy-server-nameserver:
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query
    - 223.5.5.5
    - 119.29.29.29

  nameserver-policy:
    "rule-set:cn_domain":
      - 223.5.5.5
      - 119.29.29.29
    "rule-set:private_domain":
      - 223.5.5.5
      - 119.29.29.29

  nameserver:
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query
    - 223.5.5.5
    - 119.29.29.29

proxies:
  - {name: DNS_Hijack, type: dns}

proxy-groups:
  - name: 节点选择
    type: select
    proxies:
      - 自动选择
      - 故障转移
      - 优质节点
      - 亚洲节点
      - 流媒体节点
      - 香港节点
      - 日本节点
      - 新加坡节点
      - 美国节点
      - 韩国节点
      - 台湾节点
      - 全部节点
      - DIRECT
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Proxy.png

  - name: 自动选择
    type: url-test
    include-all: true
    exclude-type: "dns"
    filter: "^(?!.*(?:回国|游戏|家宽|直连)).*$"
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
    lazy: true
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Auto.png

  - name: 故障转移
    type: fallback
    include-all: true
    exclude-type: "dns"
    filter: "^(?!.*(?:回国|游戏|家宽|直连)).*$"
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    lazy: true
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Available.png

  - name: 优质节点
    type: url-test
    include-all: true
    exclude-type: "dns"
    filter: "(?i)^(?=.*(?:BGP|IEPL|IPLC|专线|流媒体))(?!.*(?:回国|游戏|家宽|直连)).*$"
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
    lazy: true
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Server.png

  - name: 流媒体节点
    type: url-test
    include-all: true
    exclude-type: "dns"
    filter: "(?i)^(?=.*(?:流媒体|NF|奈飞|Netflix|解锁|Disney|D\\+|TikTok))(?!.*(?:回国|游戏|家宽|直连)).*$"
    url: https://cp.cloudflare.com/generate_204
