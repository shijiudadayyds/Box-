# ================================
# Box / Mihomo 懒人配置模板（公开版）
# 无订阅信息 | 开箱即用 | OpenAI强锁定
# 使用方法：
# 👉 将 proxy-providers 中 url 替换为你的订阅链接
# ================================

proxy-providers:
  订阅1:
    type: http
    url: "填写你的订阅链接"
    path: ./proxy_provider/proxy1.yaml
    interval: 86400
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 300

  订阅2:
    type: http
    url: "填写你的订阅链接"
    path: ./proxy_provider/proxy2.yaml
    interval: 86400
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 300

  订阅3:
    type: http
    url: "填写你的订阅链接"
    path: ./proxy_provider/proxy3.yaml
    interval: 86400
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 300

  订阅4:
    type: http
    url: "填写你的订阅链接"
    path: ./proxy_provider/proxy4.yaml
    interval: 86400
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 300

mixed-port: 7890
port: 7891
socks-port: 12306
redir-port: 9797
tproxy-port: 9898

mode: Rule
bind-address: "*"
ipv6: true
allow-lan: true
unified-delay: true
tcp-concurrent: true
log-level: error
find-process-mode: always

external-controller: 0.0.0.0:9090
external-ui: ./dashboard

profile:
  store-selected: true
  store-fake-ip: true

dns:
  enable: true
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - 223.5.5.5
    - 1.1.1.1
    - 8.8.8.8

proxies:
  - {name: DNS_Hijack, type: dns}

proxy-groups:

  - name: 自动选择
    type: url-test
    include-all: true
    url: https://cp.cloudflare.com/generate_204
    interval: 300

  - name: 故障转移
    type: fallback
    include-all: true
    url: https://cp.cloudflare.com/generate_204
    interval: 300

  - name: 日本节点
    type: url-test
    include-all: true
    filter: "(?i)(日本|jp|japan|tokyo|osaka)"
    url: https://cp.cloudflare.com/generate_204

  - name: 香港节点
    type: url-test
    include-all: true
    filter: "(?i)(香港|hk|hong kong)"

  - name: 美国节点
    type: url-test
    include-all: true
    filter: "(?i)(美国|us|usa|america)"

  - name: 全部节点
    type: select
    include-all: true

  # OpenAI 强锁定模板
  - name: OpenAI专用
    type: fallback
    proxies:
      - 在这里填你的主节点
      - 在这里填你的备用节点1
      - 在这里填你的备用节点2
    url: https://chatgpt.com
    interval: 300

  - name: OpenAI
    type: select
    proxies:
      - OpenAI专用
      - 自动选择
      - DIRECT

  - name: 国外代理
    type: select
    proxies:
      - 自动选择
      - 故障转移

  - name: 国内直连
    type: select
    proxies:
      - DIRECT

  - name: 漏网之鱼
    type: select
    proxies:
      - 国外代理
      - 国内直连

rules:
  - DST-PORT,53,DNS_Hijack

  - DOMAIN-SUFFIX,chatgpt.com,OpenAI
  - DOMAIN-SUFFIX,openai.com,OpenAI

  - MATCH,国外代理