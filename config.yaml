proxy-providers:
  良心云:
    type: http
    url: "https://liangxin.xyz/api/v1/liangxin?OwO=8dadaedfd0e238184acd41dae296b28d"
    path: ./proxy_provider/proxy1.yaml
    interval: 86400
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 300

  桃花:
    type: http
    url: "https://x.taohua.sbs/api/v1/client/subscribe?token=d555712841efdbed546d882c8681f98e&flag=meta"
    path: ./proxy_provider/proxy2.yaml
    interval: 86400
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 300

  随心飞:
    type: http
    url: "https://sub.suixinfly.com/api/v1/client/subscribe?token=df774354cce89dff597dd73bc7adb1cc"
    path: ./proxy_provider/proxy3.yaml
    interval: 86400
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 300

  阿飞:
    type: http
    url: "https://afeisubscription.18934569.xyz/api/v1/client/subscribe?token=060add8c21708ae8d5d6a86f5eb51295"
    path: ./proxy_provider/proxy4.yaml
    interval: 86400
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 300

mixed-port: 7890
port: 7891
socks-port: 12306
redir-port: 9797
tproxy-port: 9898

mode: Rule
allow-lan: true
log-level: error

proxies:
  - {name: DNS_Hijack, type: dns}

proxy-groups:

  - name: 自动选择
    type: url-test
    include-all: true
    url: https://cp.cloudflare.com/generate_204
    interval: 300

  - name: 故障转移
    type: fallback
    include-all: true
    url: https://cp.cloudflare.com/generate_204
    interval: 300

  # OpenAI 智能筛选节点（只选优质节点）
  - name: OpenAI候选
    type: url-test
    include-all: true
    filter: "(?i)(日本|jp|japan|东京|osaka).*(高速|BGP|流媒体)"
    url: https://chatgpt.com
    interval: 300
    tolerance: 50

  # OpenAI 强锁定
  - name: OpenAI专用
    type: fallback
    proxies:
      - 日本高速01|BGP|流媒体
      - 日本高速02|BGP|流媒体
      - 日本高速03|BGP|流媒体
      - OpenAI候选
    url: https://chatgpt.com
    interval: 300

  - name: OpenAI
    type: select
    proxies:
      - OpenAI专用
      - 自动选择
      - DIRECT

  - name: 国外代理
    type: select
    proxies:
      - 自动选择
      - 故障转移

rules:
  - DST-PORT,53,DNS_Hijack

  - DOMAIN-SUFFIX,chatgpt.com,OpenAI
  - DOMAIN-SUFFIX,openai.com,OpenAI
  - DOMAIN-SUFFIX,api.openai.com,OpenAI

  - MATCH,国外代理